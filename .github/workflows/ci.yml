name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  dogfood-smoke:
    name: Dogfood smoke
    runs-on: ubuntu-latest
    needs: check
    if: ${{ github.event_name == 'push' && vars.OPENCODE_LCM_ENABLE_DOGFOOD_SMOKE == '1' }}
    env:
      OPENCODE_LCM_DOGFOOD_CLI_VERSION: ${{ vars.OPENCODE_LCM_DOGFOOD_CLI_VERSION || 'latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@${{ env.OPENCODE_LCM_DOGFOOD_CLI_VERSION }}

      - name: Verify opencode CLI availability
        run: opencode --version

      - name: Run dogfood smoke test
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCODE_LCM_DOGFOOD_MODEL: ${{ vars.OPENCODE_LCM_DOGFOOD_MODEL || 'openai/gpt-5.4-mini' }}
        run: npm run dogfood:opencode
